<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="ca" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="ca-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e53e3e"/>
    </marker>
    <marker id="ca-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38a169"/>
    </marker>
    <linearGradient id="s1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ebf8ff"/>
      <stop offset="100%" style="stop-color:#bee3f8"/>
    </linearGradient>
    <linearGradient id="s2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fffff0"/>
      <stop offset="100%" style="stop-color:#fefcbf"/>
    </linearGradient>
    <linearGradient id="s3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff"/>
      <stop offset="100%" style="stop-color:#e9d8fd"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" font-size="18" fill="#1a202c" font-weight="600">Figure 5: Contradiction Detection Pipeline</text>

  <!-- Input -->
  <rect x="350" y="55" width="260" height="50" rx="8" fill="#f7fafc" stroke="#4a5568" stroke-width="1.5"/>
  <text x="480" y="76" text-anchor="middle" font-size="12" fill="#2d3748" font-weight="600">Fragment Corpus</text>
  <text x="480" y="93" text-anchor="middle" font-size="10" fill="#718096">All active fragments in storage</text>

  <line x1="480" y1="105" x2="480" y2="130" stroke="#4a5568" stroke-width="1.5" marker-end="url(#ca)"/>

  <!-- ====== STAGE 1 ====== -->
  <rect x="80" y="140" width="800" height="135" rx="10" fill="url(#s1Grad)" stroke="#3182ce" stroke-width="1.5"/>
  <text x="100" y="163" font-size="13" fill="#2b6cb0" font-weight="600">Stage 1: Cosine Similarity Pre-filter (pgvector)</text>

  <!-- Inner flow -->
  <rect x="110" y="178" width="170" height="55" rx="6" fill="white" stroke="#3182ce" stroke-width="1"/>
  <text x="195" y="198" text-anchor="middle" font-size="10.5" fill="#2d3748" font-weight="600">Pairwise Cosine</text>
  <text x="195" y="214" text-anchor="middle" font-size="9.5" fill="#4a5568">pgvector: 1 - (a &lt;=&gt; b)</text>
  <text x="195" y="228" text-anchor="middle" font-size="9" fill="#718096">On embedding vectors</text>

  <line x1="280" y1="205" x2="330" y2="205" stroke="#4a5568" stroke-width="1.2" marker-end="url(#ca)"/>

  <!-- Threshold check -->
  <polygon points="410,178 470,205 410,232 350,205" fill="white" stroke="#3182ce" stroke-width="1.2"/>
  <text x="410" y="202" text-anchor="middle" font-size="9.5" fill="#2b6cb0">cosine</text>
  <text x="410" y="214" text-anchor="middle" font-size="9.5" fill="#2b6cb0">> 0.75?</text>

  <!-- No path: discard -->
  <line x1="470" y1="205" x2="560" y2="205" stroke="#38a169" stroke-width="1.2" marker-end="url(#ca-green)"/>
  <text x="515" y="198" text-anchor="middle" font-size="9" fill="#38a169">No</text>

  <rect x="570" y="188" width="130" height="34" rx="6" fill="#f0fff4" stroke="#38a169" stroke-width="1"/>
  <text x="635" y="210" text-anchor="middle" font-size="10" fill="#276749">Not contradictory</text>

  <!-- Yes path: to stage 2 -->
  <line x1="410" y1="232" x2="410" y2="255" stroke="#3182ce" stroke-width="1.2"/>
  <text x="425" y="248" font-size="9" fill="#3182ce">Yes</text>

  <!-- Volume indicator -->
  <rect x="720" y="178" width="140" height="55" rx="6" fill="white" stroke="#a0aec0" stroke-width="0.8"/>
  <text x="790" y="196" text-anchor="middle" font-size="9.5" fill="#2d3748" font-weight="600">Volume Reduction</text>
  <text x="790" y="212" text-anchor="middle" font-size="9.5" fill="#4a5568">~95% pairs eliminated</text>
  <text x="790" y="226" text-anchor="middle" font-size="9" fill="#718096">Cheap vector operation</text>

  <!-- Connector to stage 2 -->
  <line x1="410" y1="275" x2="410" y2="295" stroke="#4a5568" stroke-width="1.2"/>
  <line x1="410" y1="295" x2="480" y2="295" stroke="#4a5568" stroke-width="1.2"/>
  <line x1="480" y1="295" x2="480" y2="310" stroke="#4a5568" stroke-width="1.5" marker-end="url(#ca)"/>

  <!-- ====== STAGE 2 ====== -->
  <rect x="80" y="320" width="800" height="120" rx="10" fill="url(#s2Grad)" stroke="#d69e2e" stroke-width="1.5"/>
  <text x="100" y="343" font-size="13" fill="#b7791f" font-weight="600">Stage 2: NLI Classification (mDeBERTa-v3-base-xnli-multilingual)</text>

  <rect x="110" y="358" width="190" height="55" rx="6" fill="white" stroke="#d69e2e" stroke-width="1"/>
  <text x="205" y="378" text-anchor="middle" font-size="10.5" fill="#2d3748" font-weight="600">NLI Inference</text>
  <text x="205" y="394" text-anchor="middle" font-size="9.5" fill="#4a5568">Premise: fragment A</text>
  <text x="205" y="407" text-anchor="middle" font-size="9.5" fill="#4a5568">Hypothesis: fragment B</text>

  <line x1="300" y1="385" x2="345" y2="385" stroke="#4a5568" stroke-width="1.2" marker-end="url(#ca)"/>

  <!-- NLI decision -->
  <polygon points="425,358 490,385 425,412 360,385" fill="white" stroke="#d69e2e" stroke-width="1.2"/>
  <text x="425" y="382" text-anchor="middle" font-size="9" fill="#b7791f">label ==</text>
  <text x="425" y="394" text-anchor="middle" font-size="9" fill="#b7791f">contradiction?</text>

  <!-- No path -->
  <line x1="490" y1="385" x2="560" y2="385" stroke="#38a169" stroke-width="1.2" marker-end="url(#ca-green)"/>
  <text x="525" y="378" text-anchor="middle" font-size="9" fill="#38a169">No</text>

  <rect x="570" y="370" width="130" height="30" rx="6" fill="#f0fff4" stroke="#38a169" stroke-width="1"/>
  <text x="635" y="390" text-anchor="middle" font-size="10" fill="#276749">Not contradictory</text>

  <!-- Yes path -->
  <line x1="425" y1="412" x2="425" y2="430" stroke="#d69e2e" stroke-width="1.2"/>
  <text x="440" y="425" font-size="9" fill="#d69e2e">Yes</text>

  <!-- Confidence box -->
  <rect x="720" y="358" width="140" height="55" rx="6" fill="white" stroke="#a0aec0" stroke-width="0.8"/>
  <text x="790" y="376" text-anchor="middle" font-size="9.5" fill="#2d3748" font-weight="600">Confidence Gate</text>
  <text x="790" y="392" text-anchor="middle" font-size="9.5" fill="#4a5568">Entailment / Neutral /</text>
  <text x="790" y="406" text-anchor="middle" font-size="9.5" fill="#4a5568">Contradiction scores</text>

  <!-- Connector to stage 3 -->
  <line x1="425" y1="440" x2="480" y2="440" stroke="#4a5568" stroke-width="1.2"/>
  <line x1="480" y1="440" x2="480" y2="460" stroke="#4a5568" stroke-width="1.5" marker-end="url(#ca)"/>

  <!-- ====== STAGE 3 ====== -->
  <rect x="80" y="470" width="800" height="105" rx="10" fill="url(#s3Grad)" stroke="#805ad5" stroke-width="1.5"/>
  <text x="100" y="493" font-size="13" fill="#553c9a" font-weight="600">Stage 3: LLM Arbitration (Final Judgment)</text>

  <rect x="110" y="505" width="210" height="50" rx="6" fill="white" stroke="#805ad5" stroke-width="1"/>
  <text x="215" y="525" text-anchor="middle" font-size="10.5" fill="#2d3748" font-weight="600">LLM Prompt</text>
  <text x="215" y="541" text-anchor="middle" font-size="9.5" fill="#4a5568">"Do these fragments contradict?"</text>

  <line x1="320" y1="530" x2="370" y2="530" stroke="#4a5568" stroke-width="1.2" marker-end="url(#ca)"/>

  <!-- LLM verdict -->
  <polygon points="450,505 520,530 450,555 380,530" fill="white" stroke="#805ad5" stroke-width="1.2"/>
  <text x="450" y="527" text-anchor="middle" font-size="9.5" fill="#553c9a">LLM</text>
  <text x="450" y="540" text-anchor="middle" font-size="9.5" fill="#553c9a">verdict?</text>

  <!-- Confirmed contradiction -->
  <line x1="520" y1="530" x2="580" y2="530" stroke="#e53e3e" stroke-width="1.5" marker-end="url(#ca-red)"/>
  <text x="550" y="523" text-anchor="middle" font-size="9" fill="#e53e3e">Yes</text>

  <rect x="590" y="508" width="170" height="45" rx="6" fill="#fff5f5" stroke="#e53e3e" stroke-width="1.5"/>
  <text x="675" y="527" text-anchor="middle" font-size="10.5" fill="#c53030" font-weight="600">Contradiction Found</text>
  <text x="675" y="543" text-anchor="middle" font-size="9.5" fill="#4a5568">supersede() or user alert</text>

  <!-- Not contradiction -->
  <line x1="450" y1="555" x2="450" y2="567" stroke="#38a169" stroke-width="1.2"/>
  <text x="465" y="565" font-size="9" fill="#38a169">No</text>

  <!-- Cost box -->
  <rect x="790" y="505" width="70" height="50" rx="6" fill="white" stroke="#a0aec0" stroke-width="0.8"/>
  <text x="825" y="525" text-anchor="middle" font-size="9" fill="#2d3748" font-weight="600">Cost</text>
  <text x="825" y="540" text-anchor="middle" font-size="9" fill="#718096">Highest</text>
  <text x="825" y="553" text-anchor="middle" font-size="9" fill="#718096">per call</text>

  <!-- Summary bar -->
  <rect x="80" y="585" width="800" height="28" rx="6" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="604" text-anchor="middle" font-size="10.5" fill="#4a5568">Cascade Design: each stage filters aggressively, minimizing expensive LLM calls to only genuinely ambiguous cases</text>
</svg>