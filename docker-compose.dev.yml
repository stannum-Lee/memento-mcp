services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: memento_dev
      POSTGRES_USER: memento
      POSTGRES_PASSWORD: memento_dev
    ports:
      - "35432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memento -d memento_dev"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "36379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
